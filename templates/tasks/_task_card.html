<div class="task-card"
     draggable="true"
     data-id="{{ task.pk }}"
     data-title="{{ task.title }}"
     data-description="{{ task.description }}"
     data-status="{{ task.status }}"
     data-priority="{{ task.priority }}"
     data-due="{{ task.due_date|default:'' }}">
  <div class="task-card-title">{{ task.title }}</div>
  {% if task.description %}
    <div class="task-card-desc">{{ task.description }}</div>
  {% endif %}
  <div class="task-card-meta">
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
      {% if task.priority == 3 %}
        <span class="badge badge-high">High</span>
      {% elif task.priority == 2 %}
        <span class="badge badge-medium">Medium</span>
      {% else %}
        <span class="badge badge-low">Low</span>
      {% endif %}
      {% if task.due_date %}
        <span class="task-card-date {% if task.is_overdue %}overdue{% endif %}">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          {{ task.due_date }}
        </span>
      {% endif %}
    </div>
    <div class="task-card-actions">
      <button class="icon-btn edit-btn" title="Edit" data-id="{{ task.pk }}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
      <button class="icon-btn danger delete-btn" title="Delete" data-id="{{ task.pk }}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      </button>
    </div>
  </div>
</div>
